apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: antreanodeconfigs.crd.antrea.io
  labels:
    app: antrea
spec:
  group: crd.antrea.io
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required:
          - spec
          properties:
            spec:
              type: object
              required:
                - nodeSelector
              properties:
                nodeSelector:
                  description: Selects Nodes to which this AntreaNodeConfig applies.
                  type: object
                  properties:
                    matchExpressions:
                      type: array
                      items:
                        type: object
                        properties:
                          key:
                            type: string
                          operator:
                            type: string
                            enum:
                              - In
                              - NotIn
                              - Exists
                              - DoesNotExist
                          values:
                            type: array
                            items:
                              type: string
                              pattern: "^(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])?$"
                    matchLabels:
                      x-kubernetes-preserve-unknown-fields: true
                secondaryNetwork:
                  description: Secondary network bridge configuration for the selected Nodes.
                  type: object
                  properties:
                    ovsBridges:
                      description: >-
                        OVS bridge configurations for secondary networks.
                        At the moment, only a single OVS bridge is supported.
                      type: array
                      x-kubernetes-list-type: map
                      x-kubernetes-list-map-keys:
                        - bridgeName
                      maxItems: 1
                      x-kubernetes-validations:
                        - rule: "oldSelf.all(o, self.exists(s, s.bridgeName == o.bridgeName))"
                          message: "bridgeName is immutable — existing bridge names cannot be removed or renamed"
                      items:
                        type: object
                        properties:
                          bridgeName:
                            description: Name of the OVS bridge. Defaults to "br1".
                            type: string
                            default: "br1"
                          physicalInterfaces:
                            description: >-
                              Physical interfaces to be connected to this bridge.
                            type: array
                            items:
                              type: object
                              required:
                                - name
                              properties:
                                name:
                                  description: Name of the physical interface.
                                  type: string
                                  minLength: 1
                                allowedVLANs:
                                  description: >-
                                    VLAN IDs or VLAN ID ranges (e.g. "100",
                                    "200-300") allowed on this interface.
                                    If not specified, all VLANs are allowed.
                                  type: array
                                  items:
                                    type: string
                                    pattern: '^((?:[0-9]{1,3}|[1-3][0-9]{3}|40[0-8][0-9]|409[0-4])|(?:[0-9]{1,3}|[1-3][0-9]{3}|40[0-8][0-9]|409[0-4])-(?:[0-9]{1,3}|[1-3][0-9]{3}|40[0-8][0-9]|409[0-4]))$'
                          enableMulticastSnooping:
                            description: >-
                              Enable multicast snooping on the bridge so that
                              multicast traffic is forwarded only to ports with
                              interested receivers. Defaults to false.
                            type: boolean
                            default: false
      additionalPrinterColumns:
        - jsonPath: .metadata.creationTimestamp
          name: Age
          type: date
  scope: Cluster
  names:
    plural: antreanodeconfigs
    singular: antreanodeconfig
    kind: AntreaNodeConfig
    shortNames:
      - anc
