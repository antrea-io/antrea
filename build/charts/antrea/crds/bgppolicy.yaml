apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: bgppolicies.crd.antrea.io
spec:
  group: crd.antrea.io
  versions:
    - name: v1alpha2
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - nodeSelector
                - localASN
                - advertisements
                - bgpPeers
              properties:
                nodeSelector:
                  type: object
                  properties:
                    matchExpressions:
                      items:
                        properties:
                          key:
                            type: string
                          operator:
                            enum:
                              - In
                              - NotIn
                              - Exists
                              - DoesNotExist
                            type: string
                          values:
                            items:
                              type: string
                              pattern: "^(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])?$"
                            type: array
                        type: object
                      type: array
                    matchLabels:
                      x-kubernetes-preserve-unknown-fields: true
                localASN:
                  type: integer
                  minimum: 64512
                  maximum: 65535
                  format: int32
                listenPort:
                  type: integer
                  minimum: 1
                  maximum: 65535
                  format: int32
                  default: 179
                advertisements:
                  type: object
                  anyOf:
                    - required: [services]
                    - required: [pods]
                    - required: [egressIPs]
                  properties:
                    services:
                      type: array
                      items:
                        type: object
                        anyOf:
                          - required: [ clusterIPs ]
                          - required: [ externalIPs ]
                          - required: [ loadBalancerIPs ]
                        properties:
                          clusterIPs:
                            type: boolean
                            default: false
                          externalIPs:
                            type: boolean
                            default: false
                          loadBalancerIPs:
                            type: boolean
                            default: false
                    pods:
                      type: array
                      items:
                        type: object
                        properties: {}
                    egressIPs:
                      type: boolean
                      default: false
                bgpPeers:
                  type: array
                  items:
                    type: object
                    required:
                      - address
                      - asn
                    properties:
                      address:
                        type: string
                        format: cidr
                      port:
                        type: integer
                        default: 179
                        format: int32
                        minimum: 1
                        maximum: 65535
                      asn:
                        type: integer
                        minimum: 1
                        maximum: 65535
                        format: int32
                      gracefulRestartTime:
                        type: integer
                        default: 120
                        format: int32
                        minimum: 1
                        maximum: 3600
      additionalPrinterColumns:
        - description: Local BGP ASN.
          jsonPath: .spec.localASN
          name: Local ASN
          type: integer
        - jsonPath: .metadata.creationTimestamp
          name: Age
          type: date
      subresources:
        status: {}
  scope: Cluster
  names:
    plural: bgppolicies
    singular: bgppolicy
    kind: BGPPolicy
    shortNames:
      - bp
