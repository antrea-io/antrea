apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller
  namespace: system
spec:
  template:
    spec:
      containers:
        - command: ["/bin/sh"]
        - args:
          - antrea-mc-controller-coverage
          - leader
          - --config=/controller_manager_config.yaml
          image: antrea/antrea-mc-controller-coverage:latest
