---
apiVersion: "crd.antrea.io/v1beta1"
kind: IPPool
metadata:
  name: secnet-ipv4-1
spec:
  ipRanges:
  - cidr: "148.14.24.0/24"
  subnetInfo:
    gateway: "148.14.24.1"
    prefixLength: 24

---
apiVersion: "crd.antrea.io/v1beta1"
kind: IPPool
metadata:
  name: secnet-ipv4-2
spec:
  ipRanges:
  - start: "148.14.25.111"
    end: "148.14.25.123"
  subnetInfo:
    gateway: "148.14.25.1"
    prefixLength: 24

---
apiVersion: "crd.antrea.io/v1beta1"
kind: IPPool
metadata:
  name: secnet-ipv4-3
spec:
  ipRanges:
  - cidr: "148.14.26.0/24"
  subnetInfo:
    gateway: "148.14.26.1"
    prefixLength: 24
    vlan: 300

---
apiVersion: "crd.antrea.io/v1beta1"
kind: IPPool
metadata:
  name: secnet-ipv6-1
spec:
  ipRanges:
  - cidr: "10:2400:1::0/96"
  subnetInfo:
    gateway: "10:2400:1::1"
    prefixLength: 64

---
apiVersion: "crd.antrea.io/v1beta1"
kind: IPPool
metadata:
  name: secnet-ipv6-2
spec:
  ipRanges:
  - cidr: "10:2400:2::0/96"
  subnetInfo:
    gateway: "10:2400:2::1"
    prefixLength: 64

---
apiVersion: "crd.antrea.io/v1beta1"
kind: IPPool
metadata:
  name: secnet-ipv6-3
spec:
  ipRanges:
  - cidr: "10:2400::0/96"
  subnetInfo:
    gateway: "10:2400::1"
    prefixLength: 64

---
apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: sriov-net1
spec:
  config: '{
      "cniVersion": "0.3.0",
      "type": "antrea",
      "networkType": "sriov",
      "ipam": {
        "type": "antrea",
        "ippools": ["secnet-ipv4-1"]
      }
    }'

---
apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: sriov-net2
spec:
  config: '{
      "cniVersion": "0.3.0",
      "type": "antrea",
      "networkType": "sriov",
      "ipam": {
        "type": "antrea",
        "ippools": ["secnet-ipv4-2"]
      }
    }'

---
apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: sriov-net3
spec:
  config: '{
      "cniVersion": "0.3.0",
      "type": "antrea",
      "networkType": "sriov",
      "ipam": {
        "type": "antrea",
        "ippools": ["secnet-ipv4-3"]
      }
    }'

---
apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: vlan-net1
spec:
  config: '{
      "cniVersion": "0.3.0",
      "type": "antrea",
      "networkType": "vlan",
      "mtu": 1300,
      "vlan": 100,
      "ipam": {
        "type": "antrea",
        "ippools": ["secnet-ipv4-1", "secnet-ipv6-1"]
      }
    }'

---
apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: vlan-net2
spec:
  config: '{
      "cniVersion": "0.3.0",
      "type": "antrea",
      "networkType": "vlan",
      "ipam": {
        "type": "antrea",
        "ippools": ["secnet-ipv4-2", "secnet-ipv6-2"]
      }
    }'

---
apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: vlan-net3
spec:
  config: '{
      "cniVersion": "0.3.0",
      "type": "antrea",
      "networkType": "vlan",
      "ipam": {
        "type": "antrea",
        "ippools": ["secnet-ipv4-3", "secnet-ipv6-3"]
      }
    }'

---
# VLAN 300 on eth3 for AntreaNodeConfig pool1 (see antrea-node-configs-nodepools.yml).
apiVersion: crd.antrea.io/v1beta1
kind: IPPool
metadata:
  name: secnet-ipv4-pool1-vlan300
spec:
  ipRanges:
  - cidr: "148.14.28.0/24"
  subnetInfo:
    gateway: "148.14.28.1"
    prefixLength: 24
    vlan: 300
---
apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: vlan-net-pool1-eth3-300
spec:
  config: '{
      "cniVersion": "0.3.0",
      "type": "antrea",
      "networkType": "vlan",
      "ipam": {
        "type": "antrea",
        "ippools": ["secnet-ipv4-pool1-vlan300"]
      }
    }'
---
# VLAN 400 on eth3 for AntreaNodeConfig pool2 (see antrea-node-configs-nodepools.yml).
apiVersion: crd.antrea.io/v1beta1
kind: IPPool
metadata:
  name: secnet-ipv4-pool2-vlan400
spec:
  ipRanges:
  - cidr: "148.14.27.0/24"
  subnetInfo:
    gateway: "148.14.27.1"
    prefixLength: 24
---
apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: vlan-net-pool2-eth3-400
spec:
  config: '{
      "cniVersion": "0.3.0",
      "type": "antrea",
      "networkType": "vlan",
      "vlan": 400,
      "ipam": {
        "type": "antrea",
