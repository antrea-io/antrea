      }
    }'
---
# Shared VLAN 100 on eth2 for cross-pool connectivity (pool1 and pool2 both allow VLAN 100 on eth2).
apiVersion: crd.antrea.io/v1beta1
kind: IPPool
metadata:
  name: cross-pool-vlan100-eth2
spec:
  ipRanges:
  - cidr: "172.27.100.0/24"
  subnetInfo:
    gateway: "172.27.100.1"
    prefixLength: 24
---
apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: vlan-net-cross-pool-eth2-vlan100
spec:
  config: '{
      "cniVersion": "0.3.0",
      "type": "antrea",
      "networkType": "vlan",
      "vlan": 100,
      "ipam": {
        "type": "antrea",
        "ippools": ["cross-pool-vlan100-eth2"]
      }
    }'